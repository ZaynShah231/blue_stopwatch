name: blue_stopwatch
description: A professional stopwatch app with lap tracking and dark mode

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2E7FD8"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#2E7FD8"
  image: "assets/images/app_icon.png"
  android: true
  ios: true
  android_12:
    color: "#2E7FD8"
    image: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/